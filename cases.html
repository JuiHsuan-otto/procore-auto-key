    <script>
        // 全局搜尋邏輯
        const searchInput = document.getElementById('global-search');
        const resultsDiv = document.getElementById('search-results');

        if (searchInput) {
            searchInput.addEventListener('input', async (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query.length < 1) {
                    resultsDiv.classList.add('hidden');
                    return;
                }

                try {
                    const response = await fetch('/blog.json?t=' + new Date().getTime());
                    const data = await response.json();
                    
                    const filtered = data.filter(item => 
                        item.title.toLowerCase().includes(query) || 
                        item.summary.toLowerCase().includes(query) ||
                        (item.keywords && item.keywords.some(k => k.toLowerCase().includes(query)))
                    ).slice(0, 5);

                    if (filtered.length > 0) {
                        resultsDiv.innerHTML = filtered.map(item => `
                            <a href="${item.link}" class="block p-4 border-b border-white/5 hover:bg-white/5 transition">
                                <span class="text-[9px] text-gold-primary uppercase tracking-widest">${item.category}</span>
                                <h5 class="text-white text-xs font-bold mt-1">${item.title}</h5>
                            </a>
                        `).join('');
                        resultsDiv.classList.remove('hidden');
                    } else {
                        resultsDiv.innerHTML = '<div class="p-4 text-gray-500 text-[10px]">找不到相關結果</div>';
                        resultsDiv.classList.remove('hidden');
                    }
                } catch (err) {
                    console.error('Search failed:', err);
                }
            });

            // 點擊外部關閉搜尋結果
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !resultsDiv.contains(e.target)) {
                    resultsDiv.classList.add('hidden');
                }
            });
        }
    </script>

    <script>
        const mobileToggle = document.getElementById('mobile-search-toggle');
        const mobileOverlay = document.getElementById('mobile-search-overlay');
        const mobileClose = document.getElementById('mobile-search-close');
        const mobileInput = document.getElementById('mobile-search-input');
        const mobileResults = document.getElementById('mobile-search-results');

        if (mobileToggle) {
            mobileToggle.onclick = () => {
                mobileOverlay.classList.remove('hidden');
                mobileInput.focus();
            };
            mobileClose.onclick = () => mobileOverlay.classList.add('hidden');
            
            mobileInput.addEventListener('input', async (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query.length < 1) {
                    mobileResults.innerHTML = '';
                    return;
                }
                try {
                    const response = await fetch('/blog.json?t=' + new Date().getTime());
                    const data = await response.json();
                    const filtered = data.filter(item => 
                        item.title.toLowerCase().includes(query) || 
                        item.summary.toLowerCase().includes(query)
                    );
                    mobileResults.innerHTML = filtered.map(item => `
                        <a href="${item.link}" class="block p-5 bg-white/5 border border-white/5 rounded-lg">
                            <span class="text-[10px] text-gold-primary uppercase tracking-widest">${item.category}</span>
                            <h5 class="text-white font-bold mt-2">${item.title}</h5>
                        </a>
                    `).join('');
