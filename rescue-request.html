<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>救援需求快速整理｜極致核心 ProCore</title><meta name="description" content="不用懂專業術語，快速整理車款、所在地與鑰匙狀況，複製後傳給極致核心 LINE。資料只在本機瀏覽器處理，不會儲存。"><link rel="canonical" href="https://www.carkey.com.tw/rescue-request"><meta name="robots" content="index,follow"><meta property="og:type" content="website"><meta property="og:site_name" content="極致核心 ProCore Auto Key"><meta property="og:title" content="救援需求快速整理｜極致核心 ProCore"><meta property="og:description" content="用手機整理車款、地點與狀況，產生可複製的 LINE 訊息；不需填寫敏感個資。"><meta property="og:url" content="https://www.carkey.com.tw/rescue-request"><meta property="og:image" content="https://www.carkey.com.tw/img/vcard-preview.jpg"><meta name="twitter:card" content="summary_large_image"><style>*{box-sizing:border-box}body{margin:0;background:#08090b;color:#f4f4f4;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;line-height:1.6}.wrap{width:min(720px,92%);margin:auto;padding:28px 0 70px}a{color:#d9b35f}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.brand{color:#d9b35f;text-decoration:none;font-weight:800;letter-spacing:.08em}.back{text-decoration:none}h1{font-size:clamp(1.8rem,7vw,2.6rem);line-height:1.2;margin:.3em 0}.lead{color:#b9bcc2}.notice{background:#18140b;border:1px solid #6d5723;border-radius:12px;padding:14px;margin:20px 0}.card{background:#111318;border:1px solid #282b31;border-radius:16px;padding:20px}label{display:block;font-weight:700;margin:15px 0 6px}input,select,textarea,button,.button{width:100%;font:inherit;border-radius:10px;padding:13px 14px}input,select,textarea{color:#fff;background:#090a0d;border:1px solid #43464d}input:focus,select:focus,textarea:focus{outline:2px solid #d9b35f;outline-offset:1px}textarea{min-height:90px;resize:vertical}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}button,.button{border:0;background:#d9b35f;color:#111;font-weight:800;text-align:center;text-decoration:none;cursor:pointer}.button.line{background:#06c755;color:#071b0c}.button.disabled{pointer-events:none;opacity:.45}.error{color:#ffb4ab;min-height:1.5em;margin:8px 0 0}.result{margin-top:20px}.result textarea{min-height:220px}.small{font-size:.9rem;color:#a9abb0}footer{margin-top:24px;text-align:center;color:#999}@media(max-width:560px){.grid,.actions{grid-template-columns:1fr}.card{padding:16px}}</style></head><body><main class="wrap"><header><a class="brand" href="/">PROCORE</a><a class="back" href="/">回首頁</a></header><h1>救援需求快速整理</h1><p class="lead">不用懂專業術語。填完後只會在這個頁面產生文字，方便複製或帶到 LINE；本站不會送出或儲存資料。</p><div class="notice"><strong>請保護個資：</strong>不要填車牌、VIN／車身號碼、完整地址、車主姓名，也不要放入技術流程。地點寫到縣市、區域即可。</div><form id="requestForm" class="card" novalidate><div class="grid"><div><label for="year">車輛年份</label><input id="year" inputmode="numeric" maxlength="4" placeholder="例如 2020" required></div><div><label for="brand">品牌</label><input id="brand" maxlength="30" placeholder="例如 Toyota" required></div></div><label for="model">車型</label><input id="model" maxlength="40" placeholder="例如 RAV4" required><label for="location">所在地縣市／區域</label><input id="location" maxlength="50" placeholder="例如 台中市西屯區；不要填門牌" required><label for="status">目前狀況</label><select id="status" required><option value="">請選擇</option><option>鑰匙全丟</option><option>新增備用</option><option>智能鑰匙感應不到</option><option>車子發不動</option><option>其他</option></select><label for="photos">是否方便補照片</label><select id="photos" required><option value="">請選擇</option><option>可以</option><option>目前不方便</option><option>稍後補充</option></select><label for="notes">簡短備註（選填）</label><textarea id="notes" maxlength="200" placeholder="只描述看到的狀況，不要填個資或技術細節"></textarea><p id="error" class="error" role="alert" aria-live="polite"></p><button type="submit">產生訊息</button></form><section id="result" class="result" hidden><label for="message">整理好的訊息</label><textarea id="message" readonly></textarea><div class="actions"><button id="copy" type="button">複製文字</button><a id="line" class="button line disabled" href="#" target="_blank" rel="noopener">帶到 LINE @420gknem</a></div><p id="copyStatus" class="small" aria-live="polite"></p></section><footer>電話 <a href="tel:0909277670">0909277670</a> · LINE <a href="https://line.me/R/ti/p/@420gknem" target="_blank" rel="noopener">@420gknem</a></footer></main><script>(()=>{const $=id=>document.getElementById(id),form=$('requestForm'),out=$('message'),result=$('result'),line=$('line');const preset=new URLSearchParams(location.search).get('area');if(preset)$('location').value=preset.slice(0,50);form.addEventListener('submit',e=>{e.preventDefault();const ids=['year','brand','model','location','status','photos'],missing=ids.filter(id=>!$(id).value.trim());if(missing.length){$('error').textContent='還差一點：請把年份、品牌、車型、所在地、目前狀況與照片選項填完整。';$(missing[0]).focus();return}if(!/^\d{4}$/.test($('year').value.trim())){$('error').textContent='車輛年份請輸入四位數字，例如 2020。';$('year').focus();return}$('error').textContent='';const text=`您好，我想詢問汽車鑰匙服務：\n車輛：${$('year').value.trim()} ${$('brand').value.trim()} ${$('model').value.trim()}\n所在地：${$('location').value.trim()}\n狀況：${$('status').value}\n照片：${$('photos').value}\n備註：${$('notes').value.trim()||'無'}\n（已避免填寫車牌、VIN、完整地址與姓名）`;out.value=text;line.href='https://line.me/R/oaMessage/%40420gknem/?'+encodeURIComponent(text);line.classList.remove('disabled');result.hidden=false;result.scrollIntoView({behavior:'smooth',block:'start'})});$('copy').addEventListener('click',async()=>{try{await navigator.clipboard.writeText(out.value)}catch(_){out.select();document.execCommand('copy')}$('copyStatus').textContent='已複製，可貼到 LINE。'})})();</script></body></html>
