                    return;
                }

                try {
                    const response = await fetch('/blog.json?t=' + new Date().getTime());
                    const data = await response.json();
                    
                    const filtered = data.filter(item => 
                        item.title.toLowerCase().includes(query) ||

                                <h5 class="text-white text-xs font-bold mt-1">${item.title}</h5>

                        `).join('');
                        resultsDiv.classList.remove('hidden');
                    } else {
                        resultsDiv.innerHTML = '<div class="p-4 text-gray-500 text-[10px]">找不到相關結果</div>';
