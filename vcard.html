        --card-bg: #1e1e1e;
        --gold: #D4AF37;

        --text-main: #FFFFFF;
        --text-muted: #A0A0A0;

    * {

    body {

    .vcard-container {

        width: 100%;

        position: relative;

    /* 頂部品牌區塊 */
    .vcard-header {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        padding: 40px 30px;
        text-align: center;
        border-bottom: 2px solid var(--gold);
        position: relative;
    }

    .vcard-header::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 1px;
        background: rgba(255, 255, 255, 0.2);
    }

    .brand-name {
        font-size: 22px;
        font-weight: 700;

    }

    .brand-slogan {

    }

    /* 內容區塊 */

    }

    .profile-name {

        margin-bottom: 25px;
        display: flex;

        gap: 12px;
        letter-spacing: 2px;
    }

    .profile-name span {
        font-family: 'Montserrat', sans-serif;
        font-size: 14px;
        font-weight: 300;
        color: var(--text-muted);
        letter-spacing: 1px;
    }

    /* 聯絡資訊 */
    .contact-list {

        flex-direction: column;
        gap: 16px;
        margin-bottom: 30px;
    }

    .contact-item {

        color: var(--text-main);
        font-size: 15px;
        transition: color 0.3s ease;
        padding: 10px 15px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .contact-item:hover {
        color: var(--gold);
        background: rgba(212, 175, 55, 0.05);
        border-color: rgba(212, 175, 55, 0.3);
    }

    .icon {

        color: var(--gold);
        width: 24px;
        text-align: center;
    }

    /* 服務項目 */
    .services-box {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        border: 1px solid var(--border-color);
    }

    .services-box ul {
        list-style: none;
    }

    .services-box li {
        font-size: 14px;
        color: #d0d0d0;
        margin-bottom: 12px;
        position: relative;
        padding-left: 20px;
        line-height: 1.5;
        letter-spacing: 0.5px;
    }

    .services-box li:last-child {
        margin-bottom: 0;
    }

    .services-box li::before {
        content: '▪';
        position: absolute;
        left: 0;
        top: 0px;
        color: var(--gold);
        font-size: 14px;
    }

    /* QR Code 區塊 */
    .qr-section {
        text-align: center;
        padding-top: 10px;
        border-top: 1px dashed var(--border-color);
    }

    .qr-box {
        background: white;
        padding: 8px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 12px;
        margin-top: 10px;
    }

    .qr-box img {
        display: block;
        width: 110px;
        height: 110px;
    }

    .qr-text {
        font-size: 13px;
        color: var(--text-muted);

    /* 按鈕 */

        font-weight: 600;
        font-size: 15px;
        letter-spacing: 1px;
        margin-top: 25px;
        transition: background 0.3s ease, transform 0.2s ease;
    }

    .action-btn:hover {
