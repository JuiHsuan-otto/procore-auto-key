name: Site quality check
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m py_compile publish_tool.py scripts/validate_site.py scripts/site_quality_check.py scripts/remove_gps_metadata.py
      - run: python scripts/validate_site.py
      - run: python scripts/site_quality_check.py
